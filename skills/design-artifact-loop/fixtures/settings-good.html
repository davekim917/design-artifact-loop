<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Settings</title><style>
:root{--bg:#fbfbf8;--surface:#fff;--fg:#0a0a0a;--muted:#6e6e68;--accent:#1f1fff;--on-accent:#fff;--border:#e4e4dd}
*{box-sizing:border-box;margin:0}body{background:var(--bg);color:var(--fg);font-family:"Hanken Grotesk",system-ui,sans-serif}
.row{display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:14px 24px}
.save{background:var(--accent);color:var(--on-accent);border:none;border-radius:6px;padding:8px 16px}
.empty{color:var(--muted);padding:24px;text-align:center}
</style></head><body><main><div class="row"><span>Notifications</span><span>On</span></div><div class="row"><span>Theme</span><span>Auto</span></div><div class="empty">No connected apps yet.</div><div class="row"><button class="save">Save</button></div></main></body></html>
