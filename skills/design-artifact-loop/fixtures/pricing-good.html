<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Pricing</title><style>
:root{--bg:#fff;--fg:#141413;--muted:#5e5d59;--accent:#635bff;--on-accent:#fff;--border:#e6e6e6}
*{box-sizing:border-box;margin:0}body{background:var(--bg);color:var(--fg);font-family:"Hanken Grotesk",system-ui,sans-serif}
.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px}
.tier{border:1px solid var(--border);border-radius:16px;padding:24px}.price{font-size:40px;font-weight:600}
.pick{background:var(--accent);color:var(--on-accent);border:none;border-radius:8px;padding:10px 18px;width:100%}
</style></head><body><main class="tiers"><div class="tier"><h3>Free</h3><p class="price">$0</p><button class="pick">Start</button></div><div class="tier"><h3>Pro</h3><p class="price">$20</p><button class="pick">Pick</button></div><div class="tier"><h3>Team</h3><p class="price">$60</p><button class="pick">Pick</button></div></main></body></html>
