<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Sentinel</title><style>
:root{--base:#00ffff;--top:#ffff00;--bg:#ffffff}
*{box-sizing:border-box;margin:0}body{background:var(--bg);display:grid;place-items:center;height:100vh}
.stack{position:relative;width:240px;height:240px}
.layer{position:absolute;inset:0;mix-blend-mode:multiply}
.base{background:var(--base)}.top{background:var(--top);clip-path:inset(0 0 50% 0)}
/* Two layers multiply; the upper region's blended result differs from the lower
   region's colour. The rendered colour NAMES are intentionally NOT written here, so a
   text-only reader cannot guess them — only a critic that actually SEES the render can
   name the upper wedge's colour. (The spike checks the critic names it.) */
</style></head><body><div class="stack"><div class="layer base"></div><div class="layer top"></div></div></body></html>
